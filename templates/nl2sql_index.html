<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/static/purify.min.js"></script>
    <script src="/static/marked.min.js"></script>
    <script src="/static/echarts.min.js"></script>
    <link rel="stylesheet" href="/static/my.css">
    <title>{{sys_name}}</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{sys_name}}</h1>
        </div>
        
        <div class="chat-container" id="chat-container">
            <!-- 聊天内容将在这里动态生成 -->
        </div>
        
        <form id="query-form">
            <div class="input-container">
                <input type="text" class="input-field" id="query-input" name="msg" placeholder="输入你的问题，帮你深度解答" required>
                <button type="button" class="voice-button" id="voice-btn">
                    <!-- SVG麦克风图标 -->
                    <svg width="24" height="24" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M12 15c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v7c0 1.66 1.34 3 3 3zm-1-12c0-.55.45-1 1-1s1 .45 1 1v7c0 .55-.45 1-1 1s-1-.45-1-1V3zm6 9c0 3.53-2.61 6.43-6 6.92V21h2c.55 0 1 .45 1 1s-.45 1-1 1H7c-.55 0-1-.45-1-1s.45-1 1-1h2v-2.08c-3.39-.49-6-3.39-6-6.92 0-.55.45-1 1-1s1 .45 1 1c0 2.76 2.24 5 5 5s5-2.24 5-5c0-.55.45-1 1-1s1 .45 1 1z"/>
                    </svg>
                </button>
                <button type="submit" class="send-button">发送</button>
            </div>
            <input type="hidden" id ="uid" name="uid" value="{{uid}}">
        </form>
    </div>
	 <div class="status-indicator" id="status-indicator"></div>
    <div id="voice-effect" class="voice-effect" style="display:none"></div>

    <script>
        DOMPurify.addHook('uponSanitizeElement', (node, data) => {
            if (data.tagName === 'canvas') {
                node.setAttribute('id', data.attr.id);
            }
        });
        // 聊天容器
        const chatContainer = document.getElementById('chat-container');
        const queryForm = document.getElementById('query-form');
        const queryInput = document.getElementById('query-input');
        const dbUriInput = document.getElementById('db-uri-input');
        window.onload = function() {
            const greeting = `Hi，我是问数小助手～<br>
很高兴遇见你！你可以随时问我天燃气销售数据的问题，我来帮你查查
            `;
            addMessage(greeting, 'bot');
        };
        // 表单提交
        queryForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const query = queryInput.value.trim();
            
            if (!query) {
                addMessage("请填写问题", 'bot');
                return;
            }
            
            // 添加用户消息到聊天
            addMessage(query, 'user');
            
            // 清空输入框
            queryInput.value = '';            
            // 发送API请求
            fetchQueryData(query).then(data => {
                console.log("fetchQueryData后返回的数据:", data); // 调试信息
                if (data.chart) {
                    console.log("图表数据:", data.chart); // 调试信息
                    const { messageContainer, chartId, legendId } = addMessage('图表展示', 'bot', true);
                    renderChart(data.chart, data.chartType, chartId,legendId);
                } else {
                    addMessage(data, 'bot');
                }
            })
            .catch(error => {
                console.log("error_occurred", error.message);
                addMessage(`查询失败，网路请求超时，请您稍后再试`, 'bot');
            });
        });
        
        // 发送API请求
        // 修改后的fetch逻辑
        async function fetchQueryData(query) {
            const sendButton = document.querySelector('.send-button');
            try {
                sendButton.disabled = true;
                const loadingMsg = addMessage('<div class="loading-dots">处理中</div>', 'bot');

                const response = await fetch('/query/data', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `msg=${encodeURIComponent(query)}&uid=${encodeURIComponent(document.getElementById('uid').value)}`
                });

                if (loadingMsg && chatContainer.contains(loadingMsg)) {
                    chatContainer.removeChild(loadingMsg);
                }
                sendButton.disabled = false;

                if (!response.ok) throw new Error('网络响应失败');
                const data = await response.json();
                console.log("后端返回的数据:", data); // 调试信息
                // 判断图表类型
                let chartType = 'pie'; // 默认饼图
                if (query.includes('趋势') || query.includes('变化')) {
                    chartType = 'line'; // 趋势图
                } else if (query.includes('对比') || query.includes('比较')) {
                    chartType = 'bar'; // 柱状图
                }
                return { ...data, chartType }; // 返回 chart 数据
            } catch (error) {
                if (loadingMsg && chatContainer.contains(loadingMsg)) {
                    chatContainer.removeChild(loadingMsg);
                }
                sendButton.disabled = false;
                throw error;
            }
        }
        function adjustChatHeight() {
            const chatContainer = document.querySelector('.chat-container');
            const windowHeight = window.innerHeight;
            chatContainer.style.height = `${windowHeight - 100}px`;
        }

        window.addEventListener('resize', adjustChatHeight);
        window.addEventListener('load', adjustChatHeight);
        // 添加消息到聊天
        function addMessage(text, type, isChart = false) {
            const messageContainer = document.createElement('div');
            messageContainer.classList.add('message-container');
            if (isChart) {
                const chartId = `chart-${Date.now()}-${Math.floor(Math.random() * 1000)}`; // 生成唯一 ID
                const legendId = `legend-${Date.now()}-${Math.floor(Math.random() * 1000)}`; // 生成唯一图例 ID
                messageContainer.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px;">
                    <img width="24" height="24" src="/static/bot.png">
                    <div class="chart-container" style="display: flex; flex-direction: column; align-items: flex-start;">
                        <div class="chart-title" style="display: flex; justify-content: space-between; align-items: center;">
                            <span>智能生成的【数据可视化看板】已就绪：</span>
                        </div>
                        <div style="display: flex; width: 100%; height: 400px; flex-shrink: 0;">
                        <div id="${chartId}" class="chart" style="width: 100%; height: 100%;"></div>
                        <div id="${legendId}" class="legend" style="width: 30%;"></div>
                        </div>
                    </div>
                </div>
                `;
                chatContainer.appendChild(messageContainer);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                return { messageContainer, chartId, legendId };
            }
            
            // 安全处理并解析markdown/html
            const sanitizedContent = DOMPurify.sanitize(
                type === 'bot' ? marked.parse(text) : text
            );

            if (type === 'user') {
                messageContainer.classList.add('user-message-container');
                messageContainer.innerHTML = `
                    <div class="message-bubble bot-message-bubble">${sanitizedContent}</div>
                `;
            } else {
                messageContainer.classList.add('bot-message-container');
                messageContainer.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px;">
                        <img width="24" height="24" src="/static/bot.png">
                    <div class="message-bubble bot-message-bubble">${sanitizedContent}</div>
                </div>
                `;
            }
            
            chatContainer.appendChild(messageContainer);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageContainer;
        }
        function renderChart(rawData, chartType, chartId, legendId) {
            const chartDom = document.getElementById(chartId);
            if (!chartDom) {
                console.error("图表容器未找到");
                return;
            }
            const myChart = echarts.init(chartDom);

            // 自定义颜色数组
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEEAD', '#D4A5A5', '#99B898', '#FECEA8'];

            // 创建图例容器
            const legendContainer = document.getElementById(legendId);
            if (legendContainer) {
                legendContainer.innerHTML = ''; // 清空图例容器
                rawData.labels.forEach((label, index) => {
                    const legendItem = document.createElement('div');
                    legendItem.className = 'legend-item';
                    legendItem.innerHTML = `
                        <div class="legend-color" style="background-color: ${colors[index % colors.length]}"></div>
                        <div class="legend-text">${label}</div>
                    `;
                    legendContainer.appendChild(legendItem);
                });
            }

            let option;
            switch (chartType) {
                case 'line': // 趋势图
                    option = {
                        tooltip: {
                            trigger: 'axis'
                        },
                        toolbox: {
                            show: true,
                            feature: {
                                dataView: { show: true, readOnly: false },
                                magicType: { show: true, type: ['line', 'bar'] },
                                restore: { show: true },
                                saveAsImage: { show: true }
                            },
                            right: 20,
                            top: 20,
                            top: 'auto',    // 自动计算顶部位置
                            left: 'auto',   // 自动计算左侧位置
                            orient: 'horizontal'
                        },
                        xAxis: {
                            type: 'category',
                            data: rawData.labels
                        },
                        yAxis: {
                            type: 'value'
                        },
                        series: [{
                            data: rawData.values,
                            type: 'line',
                            smooth: true,
                            itemStyle: {
                                color: colors[0]
                            }
                        }]
                    };
                    break;
                case 'bar': // 柱状图
                    option = {
                        tooltip: {
                            trigger: 'axis'
                        },
                        toolbox: {
                            show: true,
                            feature: {
                                dataView: { show: true, readOnly: false },
                                magicType: { show: true, type: ['line', 'bar'] },
                                restore: { show: true },
                                saveAsImage: { show: true }
                            },
                            right: 20,
                            top: 20,
                            top: 'auto',    // 自动计算顶部位置
                            left: 'auto',   // 自动计算左侧位置
                            orient: 'horizontal'
                        },
                        xAxis: {
                            type: 'category',
                            data: rawData.labels
                        },
                        yAxis: {
                            type: 'value'
                        },
                        series: [{
                            data: rawData.values,
                            type: 'bar',
                            itemStyle: {
                                color: function(params) {
                                    return colors[params.dataIndex % colors.length];
                                }
                            }
                        }]
                    };
                    break;
                default: // 饼图
                    option = {
                        tooltip: {
                            trigger: 'item',
                            formatter: '{b}: {c} ({d}%)',
                            textStyle: {
                                fontSize: 14,
                                fontWeight: 'bold'
                            }
                        },
                        toolbox: {
                            show: true,
                            feature: {
                                dataView: { show: true, readOnly: false },
                                magicType: { show: true, type: ['line', 'bar'] },
                                restore: { show: true },
                                saveAsImage: { show: true }
                            },
                            right: 20,
                            top: 20,
                            top: 'auto',    // 自动计算顶部位置
                            left: 'auto',   // 自动计算左侧位置
                            orient: 'horizontal'
                        },
                        series: [
                            {
                                name: '数据分布',
                                type: 'pie',
                                radius: ['30%', '60%'],
                                center: ['55%', '50%'],
                                avoidLabelOverlap: false,
                                itemStyle: {
                                    borderRadius: 5,
                                    borderColor: '#fff',
                                    borderWidth: 2
                                },
                                label: {
                                    show: true,
                                    position: 'outside',
                                    formatter: '{b}: {c}',
                                    fontSize: 12,
                                    color: '#333'
                                },
                                emphasis: {
                                    label: {
                                        show: true,
                                        fontSize: '14',
                                        fontWeight: 'bold'
                                    }
                                },
                                labelLine: {
                                    show: true,
                                    length: 10,
                                    length2: 20,
                                    lineStyle: {
                                        color: '#999'
                                    }
                                },
                                data: rawData.labels.map((label, index) => ({
                                    name: label,
                                    value: rawData.values[index],
                                    itemStyle: {
                                        color: colors[index % colors.length]
                                    }
                                }))
                            }
                        ],
                        animationDuration: 1000,
                        animationEasing: 'elasticOut'
                    };
            }

            myChart.setOption(option);
            myChart.resize(); // 确保图表正确显示
        }

    </script>
     <script>
        // 语音识别功能
        const voiceBtn = document.getElementById('voice-btn');
        let isRecording = false;
        let mediaRecorder, mediaStream, timeoutId, timer;
        let audioChunks = [];
        let countdown = 10;
        // 点击切换录音状态
        voiceBtn.addEventListener('click', toggleRecording);

        async function toggleRecording() {
          if (isRecording) {
            clearTimeout(timeoutId);
            clearInterval(timer);
            mediaRecorder.stop();
            mediaStream.getTracks().forEach(track => track.stop());
            clearState();
            showStatus('🛑 已手动停止', 1500);
          } else {
            clearInterval(timer);
            document.getElementById('voice-effect').style.display = 'block';
            try {
                countdown = 10;
                queryInput.value = '';
              mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
              mediaRecorder = new MediaRecorder(mediaStream);
              setupRecorder();

              mediaRecorder.start();
              isRecording = true;
              voiceBtn.classList.add('recording');
              showStatus(`🎤 录音中 (剩余${countdown}秒)...`);
              timer = setInterval(() => {
                  countdown--;
                  showStatus(`🎤 录音中 (剩余${countdown}秒)...`);
                  if(countdown <= 0) clearInterval(timer);
              }, 1000);

              // 10秒自动停止
              timeoutId = setTimeout(autoStopRecording, 10000);
            } catch (error) {
              showStatus('❌ 麦克风不可用');
            }
          }
        }

        function setupRecorder() {
          audioChunks = [];
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = processAudio;
        }

        function autoStopRecording() {
          if (isRecording) {
            mediaRecorder.stop();
            showStatus('⏱️ 已达到10秒最长录音时间');
          }
          clearState();
        }

        function stopRecording() {
          mediaRecorder.stop();
          mediaStream.getTracks().forEach(track => {
            track.stop();  // 停止轨道
            mediaStream.removeTrack(track); // 从流中移除轨道
          });
          mediaStream = null;
          clearTimeout(timeoutId);
        }

        async function processAudio() {
          try {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('audio', audioBlob, 'recording.webm');

            const response = await fetch('/trans/audio', { method: 'POST', body: formData });
            const { text } = await response.json();

            if (text) {
              queryInput.value = text;
              showStatus('✅ 识别成功', 1500);
            }
          } catch (error) {
            showStatus('❌ 识别失败', 2000);
          } finally {
            clearState();
          }
        }

        function clearState() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            isRecording = false;
            clearInterval(timer);
            voiceBtn.classList.remove('recording');
            document.getElementById('voice-effect').style.display = 'none';
        }

        function showStatus(text, duration) {
          const indicator = document.getElementById('status-indicator');
          indicator.textContent = text;
          indicator.style.display = 'block';
          if (duration) setTimeout(() => indicator.style.display = 'none', duration);
        }
        </script>
</body>
</html>
