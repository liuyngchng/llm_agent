<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ dir }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('mcp_client.title') }}</title>
    <script type="text/javascript"  src="/static/marked.min.js"></script>
    <script type="text/javascript" src="/static/purify.min.js?a=111"></script>
    <script>window.__I18N__ = {{ i18n_js | safe }}; window.__LANG__ = "{{ lang }}";</script>
    <script type="text/javascript" src="/static/i18n.js"></script>
    <link rel="stylesheet" href="/static/font-awesome.all.min.css">
    <link rel="stylesheet" href="/static/mcp_client.css">
    {% if dir == 'rtl' %}<link rel="stylesheet" href="/static/rtl.css">{% endif %}
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-robot"></i> {{ _('mcp_client.title') }}</h1>
        </header>

        <div class="input-area">
            <div class="form-group">
                <label for="question-input"><i class="fas fa-question-circle"></i> {{ _('mcp_client.question_label') }}</label>
                <textarea id="question-input" placeholder="{{ _('mcp_client.question_placeholder') }}">{{ _('mcp_client.default_question') }}</textarea>
            </div>

            <div class="stream-toggle">
                <input type="checkbox" id="stream-toggle" checked>
                <label for="stream-toggle">{{ _('mcp_client.stream_enable') }}</label>
            </div>

            <div class="btn-container">
                <button id="submit-btn" class="btn btn-primary" onclick="submitQuestion()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>


        </div>

        <div class="form-group">
            <label for="result-area"><i class="fas fa-results"></i> {{ _('mcp_client.result_title') }}</label>
            <div id="result-area" class="result-area">
                <p style="color: #777; text-align: center;">{{ _('mcp_client.result_placeholder') }}</p>
            </div>
        </div>
        <div id="loading-overlay" class="loading-overlay"></div>
        <div id="loading" class="loading">
            <i class="fas fa-sync-alt fa-spin"></i>{{ _('mcp_client.processing') }}
        </div>
    </div>

    <script type="text/javascript" src="/static/mcp_client.js"></script>
</body>
</html>
