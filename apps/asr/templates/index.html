<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{{sys_name}}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='asr.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-microphone-alt"></i> {{sys_name}}</h1>
            <div class="model-info">
                <span>支持格式: MP3, M4A, AMR, WAV, FLAC, OGG, AAC</span>
                <div class="model-info-actions">
                    <button id="clearHistoryBtn" class="btn-clear">
                        <i class="fas fa-trash-alt"></i> 清空历史
                    </button>
                </div>
            </div>
        </header>

        <div class="chat-container">
            <div class="chat-history" id="chatHistory">
                <div class="welcome-message">
                    <i class="fas fa-head-side-microphone" style="font-size: 48px; color: #4b6cb7; margin-bottom: 15px;"></i>
                    <p>🎙️ 上传音频文件，自动转换为文字</p>
                    <p style="font-size: 0.9rem; margin-top: 10px;">支持 MP3、M4A、AMR、WAV、FLAC、OGG、AAC 等格式</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <div class="input-wrapper">
                        <div class="file-list-container" id="fileListContainer" style="display: none;">
                            <div class="file-list-header">
                                <span>已选择文件:</span>
                                <button class="clear-files-btn" onclick="clearFileList()">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                            <div class="file-list" id="fileList"></div>
                        </div>
                        <textarea id="messageInput" placeholder="可选：输入额外说明或备注..." rows="2"></textarea>
                    </div>

                    <div class="input-actions">
                        <div class="config-info">
                            <span class="config-item">
                                <i class="fas fa-microphone"></i>
                                <span>音频转文字</span>
                            </span>
                        </div>
                        <div class="input-buttons">
                            <div class="file-upload-btn-container">
                                <input type="file" id="fileInput" multiple accept=".mp3,.m4a,.amr,.wav,.flac,.ogg,.aac">
                                <button id="uploadButton" class="btn-attach" title="上传音频文件">
                                    <i class="fas fa-cloud-upload-alt"></i>
                                </button>
                                <div class="file-count-badge" id="fileCountBadge" style="display: none;">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="input-hint">
                    <small>点击上传按钮选择音频文件，系统将自动转换为文字</small>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>Powered by FunASR & FFmpeg</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='asr.js') }}"></script>
</body>
</html>
