<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ dir }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{{sys_name}}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='asr.css') }}">
    {% if dir == 'rtl' %}<link rel="stylesheet" href="/static/rtl.css">{% endif %}
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-microphone-alt"></i> {{sys_name}}</h1>
            <div class="model-info">
                <span>{{ _('asr.supported_formats') }}</span>
                <div class="model-info-actions">
                    <button id="clearHistoryBtn" class="btn-clear">
                        <i class="fas fa-trash-alt"></i> {{ _('asr.clear_history') }}
                    </button>
                </div>
            </div>
        </header>

        <div class="chat-container">
            <div class="chat-history" id="chatHistory">
                <div class="welcome-message">
                    <i class="fas fa-head-side-microphone" style="font-size: 48px; color: #4b6cb7; margin-bottom: 15px;"></i>
                    <p>🎙️ {{ _('asr.welcome') }}</p>
                    <p style="font-size: 0.9rem; margin-top: 10px;">{{ _('asr.welcome_desc') }}</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <div class="input-wrapper">
                        <div class="file-list-container" id="fileListContainer" style="display: none;">
                            <div class="file-list-header">
                                <span>{{ _('asr.selected_files') }}</span>
                                <button class="clear-files-btn" onclick="clearFileList()">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                            <div class="file-list" id="fileList"></div>
                        </div>
                        <textarea id="messageInput" placeholder="{{ _('asr.note_placeholder') }}" rows="2"></textarea>
                    </div>

                    <div class="input-actions">
                        <div class="config-info">
                            <span class="config-item">
                                <i class="fas fa-microphone"></i>
                                <span>{{ _('asr.audio_to_text') }}</span>
                            </span>
                        </div>
                        <div class="input-buttons">
                            <div class="file-upload-btn-container">
                                <input type="file" id="fileInput" multiple accept=".mp3,.m4a,.amr,.wav,.flac,.ogg,.aac">
                                <button id="uploadButton" class="btn-attach" title="上传音频文件">
                                    <i class="fas fa-cloud-upload-alt"></i>
                                    <span class="btn-text">{{ _('asr.select_file_btn') }}</span>
                                </button>
                                <div class="file-count-badge" id="fileCountBadge" style="display: none;">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="input-hint">
                    <small>{{ _('asr.upload_hint') }}</small>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>Powered by FunASR & FFmpeg</p>
        </footer>
    </div>

    <script>window.__I18N__ = {{ i18n_js | safe }}; window.__LANG__ = "{{ lang }}";</script>
    <script type="text/javascript" src="/static/i18n.js"></script>
    <script src="{{ url_for('static', filename='asr.js') }}"></script>
</body>
</html>
