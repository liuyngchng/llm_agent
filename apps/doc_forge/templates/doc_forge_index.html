<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ dir }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{sys_name}}</title>
    <link rel="stylesheet" href="/static/chat.css">
    <link rel="stylesheet" href="/static/font-awesome.6.0.0.all.min.css">
    <link rel="stylesheet" href="/static/highlight.11.8.0.github.min.css">
    {% if dir == 'rtl' %}<link rel="stylesheet" href="/static/rtl.css">{% endif %}

</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-robot"></i>{{sys_name}}</h1>
            <div class="model-info">
                <span id="modelName">{{ _('doc_forge.model_loading') }}</span>
                <div class="model-info-actions">
                    <button id="workspaceBtn" class="btn-clear">
                        <i class="fas fa-folder-open"></i> 我的电脑
                    </button>
                    <button id="clearChat" class="btn-clear">
                        <i class="fas fa-trash-alt"></i> {{ _('doc_forge.clear_chat') }}
                    </button>
                </div>
            </div>
        </header>

        <div class="chat-container">
            <div class="chat-history" id="chatHistory">
                <!-- 聊天消息会动态添加到这里 -->
                <div class="welcome-message">
                    <p>👋 {{ _('doc_forge.welcome') }}</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <div class="input-wrapper">
                        <!-- 文件列表 - 显示已选择的文件 -->
                        <div class="file-list-container" id="fileListContainer" style="display: none;">
                            <div class="file-list-header">
                                <span>{{ _('doc_forge.selected_files') }}</span>
                                <button class="clear-files-btn" onclick="clearFileList()">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                            <div class="file-list" id="fileList"></div>
                        </div>
                        <textarea id="messageInput" placeholder="{{ _('doc_forge.input_placeholder') }}" rows="3"></textarea>
                    </div>

                    <div class="input-actions">
                        <div class="config-info">
                            <span class="config-item">
                                <i class="fas fa-brain"></i>
                                <span id="currentModel">-</span>
                            </span>
                            <span class="config-item">
                                <i class="fas fa-thermometer-half"></i>
                                <span id="currentTemp">{{ '%.1f'|format(config.temperature|default(0.7)) }}</span>
                            </span>
                        </div>
                        <div class="input-buttons">
                            <!-- 简洁的文件上传按钮 -->
                            <div class="file-upload-btn-container">
                                <input type="file" id="fileInput" multiple style="display: none;">
                                <button id="uploadButton" class="btn-attach" title="{{ _('doc_forge.upload_file') }}">
                                    <i class="fas fa-paperclip"></i>
                                </button>
                                <div class="file-count-badge" id="fileCountBadge" style="display: none;">0</div>
                            </div>
                            <button id="sendButton" class="btn-send">
                                <i class="fas fa-paper-plane"></i> {{ _('doc_forge.send') }}
                            </button>
                        </div>
                    </div>
                </div>
                <div class="input-hint">
                    <small>{{ _('doc_forge.input_hint') }}</small>
                </div>
            </div>
        </div>
        <input type="hidden" id ="uid" name="uid" value="{{uid}}">
        <input type="hidden" id ="t" name="t" value="{{t}}">

        <!-- 工作空间文件浏览器模态框 -->
        <div class="workspace-modal-overlay" id="workspaceModal" style="display: none;">
            <div class="workspace-modal">
                <div class="workspace-modal-header">
                    <h2><i class="fas fa-folder-open"></i> 我的电脑</h2>
                    <button class="workspace-modal-close" id="workspaceModalClose">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="workspace-modal-body">
                    <div class="workspace-path" id="workspacePath"></div>
                    <div class="workspace-file-list" id="workspaceFileList">
                        <div class="workspace-loading"><i class="fas fa-spinner fa-spin"></i> 正在加载...</div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>Powered by Richard</p>
        </footer>
    </div>

    <script>window.__I18N__ = {{ i18n_js | safe }}; window.__LANG__ = "{{ lang }}";</script>
    <script type="text/javascript" src="/static/i18n.js"></script>
    <script type="text/javascript" src="/static/highlight.11.8.0.min.js"></script>
    <script type="text/javascript" src="/static/marked.min.js"></script>
    <script type="text/javascript" src="/static/highlight.11.8.0.javascript.min.js"></script>

    <script type="text/javascript" src="/static/highlight.11.8.0.python.min.js"></script>
    <script type="text/javascript" src="/static/highlight.11.8.0.sql.min.js"></script>
    <script type="text/javascript" src="/static/highlight.11.8.0.css.min.js"></script>
    <script type="text/javascript" src="/static/highlight.11.8.0.json.min.js"></script>
    <script type="text/javascript" src="/static/highlight.11.8.0.bash.min.js"></script>
    <script type="text/javascript" src="/static/chat.js"></script>
</body>
</html>
