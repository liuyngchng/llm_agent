<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ dir }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{sys_name}}</title>
    <link rel="stylesheet" href="/static/my_remote_doc.css">
    <link rel="stylesheet" href="/static/font-awesome.6.0.0.all.min.css">
    {% if dir == 'rtl' %}<link rel="stylesheet" href="/static/rtl.css">{% endif %}
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-cloud"></i>{{sys_name}}</h1>
            <div class="header-bottom">
                <span>{{ _('my_remote_doc.my_computer') }}</span>
                <div class="header-actions">
                    <input type="file" id="fileInput" multiple style="display: none;">
                    <button id="uploadBtn" class="btn-clear">
                        <i class="fas fa-upload"></i> 上传
                    </button>
                    <button id="refreshBtn" class="btn-clear">
                        <i class="fas fa-sync-alt"></i> 刷新
                    </button>
                </div>
            </div>
        </header>

        <div id="uploadStatus" class="upload-status" style="display: none;"></div>
        <div class="file-list-container">
            <div class="file-list" id="fileList">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> {{ _('my_remote_doc.loading') }}</div>
            </div>
        </div>
        <input type="hidden" id="uid" name="uid" value="{{uid}}">
        <input type="hidden" id="t" name="t" value="{{t}}">

        <footer class="footer">
            <p>Powered by Richard</p>
        </footer>
    </div>

    <script>window.__I18N__ = {{ i18n_js | safe }}; window.__LANG__ = "{{ lang }}";</script>
    <script type="text/javascript" src="/static/i18n.js"></script>
    <script type="text/javascript" src="/static/my_remote_doc.js"></script>
</body>
</html>
